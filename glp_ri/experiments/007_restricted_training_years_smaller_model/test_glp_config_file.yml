# Adjusted encoder structure to keep max convolutional width with fewer total parameters

# Required
model_save_file: "/home/lverhoef/glp/glp_ri/experiments/007_restricted_training_years_smaller_model/glp_cnn.pt"

# Required
training_hyperparameters:
  training_years:
    - "2015"
  batches_per_epoch: 512
  batch_size: 12
  epochs: 1000
  accumulation_batches: 8
  sampling_ratio:
    - 4
    - 1
  loss_function: crps
  learning_rate: 1.0e-3
  early_stopping:
    enabled: True
    patience: 20
    min_delta: 1.0e-4

### data_augmentation
# rotations: max_degrees, num_rotations
# noisings: standard_deviation, num_noisings
# translations: max_shift, num_translations
data_augmentation:
  noisings:
    standard_deviation: 0.5
    num_noisings: 2
  translations:
    max_shift: 0.05
    num_translations: 3

### setup_layers
# glp_rotation_stack: num_angles, angle_inc (only one needed)
setup_layers:
  glp_rotation_stack:
    type: glp_rotation_stack
    angle_inc: 30 

### encoding_layers
# conv_block: in_channels, out_channels, kernel_size, pooling_size
# glp_conv_block: in_channels, out_channels, kernel_size, pooling_size
# glp_rotation_pool: glp_pooling_size
# flatten: start_dim (default 1), end_dim (default -1)
encoding_layers:
  conv_block_1:
    type: glp_conv_block
    in_channels: 1
    out_channels: 8
  conv_block_2:
    type: glp_conv_block
    in_channels: 8
    out_channels: 8
  conv_block_3:
    type: glp_conv_block
    in_channels: 8
    out_channels: 16
  glp_pooling_1:
    type: glp_rotation_pool
    glp_pooling_size: 2
  conv_block_4:
    type: glp_conv_block
    in_channels: 16
    out_channels: 16
  conv_block_5:
    type: glp_conv_block
    in_channels: 16
    out_channels: 32
  conv_block_6:
    type: glp_conv_block
    in_channels: 32
    out_channels: 32
  flatten:
    type: flatten
    no_defaults: True
    end_dim: -2

### encoding_layer_defaults
encoding_layer_defaults:
  leaky_relu_slope: 0.2
  kernel_size: 3
  pooling_size: 2

### dense_layers
# dense_block: in_neurons, out_neurons, dropout_rate, leaky_relu_slope
# glp_dense_block: in_neurons, out_neurons, dropout_rate, leaky_relu_slope
dense_layers:
  dense_block_1:
    type: dense_block
    in_neurons: 1280
    out_neurons: 768
  dense_block_2:
    type: dense_block
    in_neurons: 768
    out_neurons: 460
  glp_flatten:
    type: flatten
    no_defaults: True
  out_layer:
    type: linear
    no_defaults: True
    in_features: 2760
    out_features: 100

### dense_layer_defaults
dense_layer_defaults:
  dropout_rate: 0.2
  leaky_relu_slope: 0.2
